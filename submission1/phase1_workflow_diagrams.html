/* Global Reset & Page Styling */
body {
  margin: 0;
  padding: 24px;

  font-family: var(--font-sans);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  box-sizing: border-box;
}

/* Navigation Panel styling */
#pn {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 24px;
  padding: 6px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 12px;
  box-shadow: 0 2px 8px var(--shadow-color);
}

.pb {
  padding: 6px 14px;
  border-radius: 8px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  line-height: 1.4;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

.pb.on {
  background: var(--bg-accent);
  color: var(--text-accent);
  border-color: var(--border-accent);
  box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
}

.pb:hover:not(.on) {
  background: var(--node-gray-bg);
  color: var(--text-primary);
}

/* SVG Rendering Container */
#pd {
  width: 100%;
  max-width: 960px;
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 4px 20px var(--shadow-color);
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* SVG Elements Styling */
svg {
  display: block;
  font-family: var(--font-sans);
}

/* General Node Rules */
.node {
  cursor: pointer;
}

.node rect {
  fill: var(--node-bg, var(--surface-1));
  stroke: var(--node-border, var(--border));
  stroke-width: 1px;
  transition: fill 0.2s ease, stroke 0.2s ease, stroke-width 0.2s ease, filter 0.2s ease;
}

.node:hover rect {
  stroke-width: 1.5px;
  filter: brightness(0.97);
}

@media (prefers-color-scheme: dark) {
  .node:hover rect {
    filter: brightness(1.12);
  }
}

.c-gray {
